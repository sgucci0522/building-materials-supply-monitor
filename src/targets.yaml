# 監視対象メーカー一覧
# category: pvc(塩ビ管) / frp(FRP/ガラスマット/樹脂) / waterproof(防水) / paint(塗料) / industry(業界団体)

targets:
  # ========== 塩ビ管メーカー ==========
  - id: kubota_chemix
    name: クボタケミックス
    category: pvc
    url: https://drain.kubota.co.jp/
    type: scrape
    selector: "body"  # ページ全体の差分を取得
    keywords:
      - "受注"
      - "供給"
      - "再開"
      - "停止"
      - "納期"
      - "値上げ"
      - "価格改定"

  - id: sekisui_news
    name: 積水化学工業 ニュース
